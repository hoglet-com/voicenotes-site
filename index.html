<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/icon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoiceNotes — Offline AI Transcription</title>
  <meta name="description" content="Transcribe audio to text completely offline. No cloud uploads, no subscriptions.">
  <link rel="canonical" href="https://voice-notes.org/">
  <link rel="alternate" hreflang="en" href="https://voice-notes.org/en/">
  <link rel="alternate" hreflang="ja" href="https://voice-notes.org/ja/">
  <link rel="alternate" hreflang="zh" href="https://voice-notes.org/zh/">
  <link rel="alternate" hreflang="ko" href="https://voice-notes.org/ko/">
  <link rel="alternate" hreflang="es" href="https://voice-notes.org/es/">
  <link rel="alternate" hreflang="x-default" href="https://voice-notes.org/en/">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: #111110;
      color: #E4E4EA;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .loader {
      text-align: center;
    }
    .spinner {
      border: 3px solid #27272B;
      border-top: 3px solid #E07820;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
  <script>
    (function() {
      // Check if user has manually selected a language before
      const savedLang = localStorage.getItem('voicenotes-lang');
      if (savedLang) {
        window.location.href = '/' + savedLang + '/';
        return;
      }

      // Detect browser language
      const browserLang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();

      // Map language codes to supported languages
      const supportedLangs = ['en', 'ja', 'zh', 'ko', 'es'];
      let targetLang = 'en'; // default

      // Check for exact match first
      if (supportedLangs.includes(browserLang)) {
        targetLang = browserLang;
      } else {
        // Check for language prefix (e.g., 'en-US' -> 'en')
        const langPrefix = browserLang.split('-')[0];
        if (supportedLangs.includes(langPrefix)) {
          targetLang = langPrefix;
        }
        // Special handling for Chinese variants
        if (browserLang.startsWith('zh-')) {
          targetLang = 'zh';
        }
      }

      // Redirect to appropriate language page
      window.location.href = '/' + targetLang + '/';
    })();
  </script>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <p>Redirecting...</p>
  </div>
</body>
</html>
